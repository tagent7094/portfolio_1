name: Deploy to tagent.club VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Auto-register new founders in git ──────────────────────────────
  register:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Auto-register new founders in founder-permissions.yaml
        id: register
        run: |
          python - <<'PYEOF'
          import os, yaml
          from pathlib import Path

          FOUNDERS_DIR = Path("data/founders")
          PERMS_FILE = Path("config/founder-permissions.yaml")

          with open(PERMS_FILE) as f:
              perms = yaml.safe_load(f) or {}

          perms.setdefault("defaults", {"pages": ["graph"]})
          perms.setdefault("founders", {})
          perms.setdefault("admin", {"password_hash": ""})

          changed = False
          for folder in sorted(FOUNDERS_DIR.iterdir()):
              if not folder.is_dir():
                  continue
              if not (folder / "founder-data").is_dir():
                  continue
              slug = folder.name.lower().replace(" ", "_").replace("-", "_")
              if slug not in perms["founders"]:
                  perms["founders"][slug] = {"pages": list(perms["defaults"]["pages"])}
                  changed = True
                  print(f"Registered new founder: {slug}")

          if changed:
              with open(PERMS_FILE, "w") as f:
                  yaml.safe_dump(perms, f, sort_keys=False, default_flow_style=False)
              print("Updated founder-permissions.yaml")
          else:
              print("No new founders — nothing to commit")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"changed={'true' if changed else 'false'}\n")
          PYEOF

      - name: Commit and push updated founder-permissions.yaml
        id: commit
        if: steps.register.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/founder-permissions.yaml
          git commit -m "chore: auto-register new founders [skip ci]"
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

  # ── Job 2: Build + deploy to VPS ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: register
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp-react/package-lock.json

      - name: Build frontend
        working-directory: webapp-react
        run: |
          npm ci
          npm run build

      # Decode the base64 key once; reuse the path in all SSH/SCP steps
      - name: Write SSH deploy key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy backend via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key root@${{ secrets.VPS_HOST }} bash <<'ENDSSH'
            set -eo pipefail
            echo "=== [deploy] Pulling latest code ==="
            cd /opt/tagent
            git config --global --add safe.directory /opt/tagent || true
            sudo -u tagent git fetch origin main
            sudo -u tagent git reset --hard origin/main
            chown -R tagent:tagent /opt/tagent/config/founder-permissions.yaml || true
            echo "=== [deploy] Restarting tagent service ==="
            systemctl restart tagent
            echo "=== [deploy] Backend deploy complete ==="
          ENDSSH

      - name: Upload frontend build
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key" \
            webapp-react/dist/ \
            root@${{ secrets.VPS_HOST }}:/opt/tagent/webapp-react/dist/

      - name: Auto-provision new founders (register, expand cert, reload)
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key root@${{ secrets.VPS_HOST }} bash <<'ENDSSH'
            set -eo pipefail
            echo "=== [provision] Starting provision script ==="
            chmod +x /opt/tagent/deploy/provision.sh
            bash /opt/tagent/deploy/provision.sh
            echo "=== [provision] Provision script complete ==="
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key
