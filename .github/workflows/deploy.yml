name: Deploy to tagent.club VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Auto-register new founders in git ──────────────────────────────
  register:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Auto-register new founders in founder-permissions.yaml
        id: register
        run: |
          python - <<'PYEOF'
          import os, yaml
          from pathlib import Path

          FOUNDERS_DIR = Path("data/founders")
          PERMS_FILE = Path("config/founder-permissions.yaml")

          with open(PERMS_FILE) as f:
              perms = yaml.safe_load(f) or {}

          perms.setdefault("defaults", {"pages": ["graph"]})
          perms.setdefault("founders", {})
          perms.setdefault("admin", {"password_hash": ""})

          changed = False
          for folder in sorted(FOUNDERS_DIR.iterdir()):
              if not folder.is_dir():
                  continue
              if not (folder / "founder-data").is_dir():
                  continue
              slug = folder.name.lower().replace(" ", "_").replace("-", "_")
              if slug not in perms["founders"]:
                  perms["founders"][slug] = {"pages": list(perms["defaults"]["pages"])}
                  changed = True
                  print(f"Registered new founder: {slug}")

          if changed:
              with open(PERMS_FILE, "w") as f:
                  yaml.safe_dump(perms, f, sort_keys=False, default_flow_style=False)
              print("Updated founder-permissions.yaml")
          else:
              print("No new founders — nothing to commit")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"changed={'true' if changed else 'false'}\n")
          PYEOF

      - name: Commit and push updated founder-permissions.yaml
        id: commit
        if: steps.register.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/founder-permissions.yaml
          git commit -m "chore: auto-register new founders [skip ci]"
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

  # ── Job 2: SSH into VPS and run deploy script directly ───────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: register
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 147.93.20.156
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            export HOME=/root
            bash /opt/tagent/deploy/ci-deploy.sh 2>&1
