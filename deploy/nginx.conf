# Nginx config for tagent.club (wildcard subdomain auth)
# Deploy to: /etc/nginx/sites-available/tagent, then symlink into sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name tagent.club *.tagent.club;

    # Let's Encrypt ACME challenge (if using webroot for apex)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tagent.club *.tagent.club;

    ssl_certificate     /etc/letsencrypt/live/tagent.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tagent.club/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static SPA
    root /opt/tagent/webapp-react/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # API proxy (with SSE support)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE: disable buffering and extend timeouts
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Asset caching
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
